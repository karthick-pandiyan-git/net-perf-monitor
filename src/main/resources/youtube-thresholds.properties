# ─────────────────────────────────────────────────────────────────────────────
# YouTube Streaming Quality Evaluation Thresholds
# ─────────────────────────────────────────────────────────────────────────────
#
# Controls the PASS/FAIL criteria applied by PerformanceEvaluator to each
# YouTube tab snapshot.  These values reflect what constitutes acceptable
# internet quality for HD YouTube streaming.
#
# Raise a threshold to be more lenient (fewer FAILs on a slow connection).
# Lower a threshold to be stricter (more FAILs if the connection degrades).
# All changes take effect on the next run — no recompile required.
# ─────────────────────────────────────────────────────────────────────────────

# ── Page Load time ─────────────────────────────────────────────────────────
# Tab 1 loads cold (fresh DNS, new TCP/TLS handshake, full resource download).
# Tabs 2+ reuse warm HTTP/2 connections and cached resources.
# 15 s cold covers real-world YouTube cold-start variance on most connections.
# 12 s warm accounts for heavy 8K pages whose initial segment fetch delays the
# Navigation Timing load event; genuine outages will still show in TTFB + BW.
youtube.eval.page_load.warm.ms=12000
youtube.eval.page_load.cold.ms=15000

# ── Time To First Byte ─────────────────────────────────────────────────────
# Tab 1 pays a cold-connection penalty (uncached DNS + full TCP/TLS handshake).
# All other tabs reuse warm connections to the YouTube CDN edge.
# At > 1500 ms warm the CDN round-trip latency is consistently degrading user
# experience; the cold allowance of 3 s covers transient CDN routing variance.
youtube.eval.ttfb.warm.ms=1500
youtube.eval.ttfb.cold.ms=3000

# ── Stream Buffer Depth ────────────────────────────────────────────────────
# Minimum seconds of pre-loaded video beyond the current playhead.
# < 10 s means the connection is barely keeping up with real-time playback.
# The consistency check uses the μ−σ lower bound: if that dips below this
# threshold the buffer occasionally ran dangerously low during the window.
youtube.eval.buffer.min_depth.secs=10.0
# Sigma multiplier for the buffer depth consistency lower-control-limit.
# lower_bound = mean - (sigma * stddev).  A value of 1.0 flags cases where
# the buffer dipped below min_depth in at least one standard deviation.
youtube.eval.buffer.consistency_lcl_sigma=1.0

# ── Streaming Bandwidth (resource-timing estimate) ─────────────────────────
# Minimum average bandwidth measured over the monitoring window.
# 250 KB/s ≈ 2 Mbps — minimum for consistent HD (720p) streaming.
youtube.eval.bandwidth.min_avg.kbps=250.0
# Below this average-BW threshold the player is considered "pre-buffered"
# (fetched all data before the monitoring window started).
youtube.eval.bandwidth.prebuf_threshold.kbps=1.0
# Minimum total bytes fetched for the pre-buffered special-case to apply.
# Prevents a genuinely slow 0-KB/s start from being mistaken for pre-buffering.
youtube.eval.bandwidth.prebuf_min_total_bytes=1000000

# ── Stats for Nerds — Connection Speed ───────────────────────────────────
# Minimum connection speed (Kbps) as reported by YouTube's internal ABR metric.
# 2500 Kbps = 2.5 Mbps (YouTube's own HD streaming minimum recommendation).
youtube.eval.sfn.min_connection_speed.kbps=2500.0

# ── Stats for Nerds — Buffer Health (consecutive-zero FAIL gate) ──────────
# Number of consecutive sweeps that must each read 0 s buffer health before
# the SFN Buffer Health check is raised to FAIL.  A single isolated 0 s
# reading is treated as a transient glitch; only a sustained drain across this
# many back-to-back sweeps (each sweep ≈ 5 s apart) is considered actionable.
# Set to 1 to restore the strict "any zero = FAIL" behaviour.
youtube.eval.sfn.buffer_health.consecutive_zero_fail=2
