# ─────────────────────────────────────────────────────────────────────────────
# Browser DOM Selectors — YouTube Player Automation
# ─────────────────────────────────────────────────────────────────────────────
#
# CSS selectors, element IDs, and XPath label names used by
# YouTubePerformanceTester to interact with the YouTube player DOM.
#
# Update these values here when YouTube changes its player markup (e.g. after
# a major player UI rollout) — no Java recompile required.
#
# Separator for multi-value properties (pause dialog selectors / SFN fallbacks):
#   values are separated by " | " so individual selectors can contain commas.
# ─────────────────────────────────────────────────────────────────────────────

# ── Player element ─────────────────────────────────────────────────────────
# The id attribute of the YouTube movie-player div.  Used for right-click,
# quality API calls, and ad detection.
yt.player.element_id=movie_player

# ── Consent / cookie dialog ────────────────────────────────────────────────
# Accepts the Google consent or cookie dialog that may appear on first load.
yt.selector.consent_dialog=button[aria-label*='Accept all'], button[aria-label*='Agree'], tp-yt-paper-button#agree, .eom-buttons button

# ── Ad overlay selectors ───────────────────────────────────────────────────
# Dismisses YouTube overlay (banner / card style) ads.
yt.selector.overlay_ad_close=.ytp-ad-overlay-close-button, .ytp-ad-overlay-close-container

# Skips a skippable pre-roll or mid-roll ad.
yt.selector.skip_ad=.ytp-skip-ad-button, .ytp-ad-skip-button, .ytp-skip-ad-button-container button, .ytp-ad-skip-button-container button

# Detects whether any ad (pre-roll, mid-roll, bumper, overlay) is currently playing.
# Used in both the Java ad-wait loop and the network-sample JavaScript snippet.
yt.selector.ad_player_overlay=.ytp-ad-player-overlay, .ytp-ad-player-overlay-layout

# ── Pause / interrupt dialog selectors ────────────────────────────────────
# YouTube shows various dialogs that pause long-running sessions ("Video paused.
# Continue watching?", "Still watching?" etc.).  List all known selectors for
# "Continue" / "Yes" buttons, separated by " | ".
# They are tried in order; the first visible match is clicked.
yt.selector.pause_dialog.1=.ytp-pause-overlay .ytp-pause-overlay-actions button
yt.selector.pause_dialog.2=.yt-confirm-dialog-renderer button
yt.selector.pause_dialog.3=tp-yt-paper-button.yt-confirm-dialog-renderer--confirm-button
yt.selector.pause_dialog.4=button[aria-label*="Continue"], button[aria-label*="Yes"], button[aria-label*="continue"]
yt.selector.pause_dialog.5=yt-confirm-dialog-renderer paper-button[dialog-confirm]
yt.selector.pause_dialog.6=#confirm-button

# ── Stats for Nerds panel selectors ───────────────────────────────────────
# Primary selector used to detect whether the SFN panel is currently visible.
# Covers both the well-known class and generic "sfn-stats" / "video-info-panel"
# class substrings to cope with YouTube's occasional class-name refactors.
yt.selector.sfn_panel=.ytp-sfn-stats, [class*="sfn-stats"], .html5-video-info-panel, [class*="video-info-panel"]

# Selectors for the label and value cells inside the SFN panel table.
yt.selector.sfn_label=.ytp-sfn-label, [class*="sfn-label"], [class*="sfn"][class*="label"]
yt.selector.sfn_value=.ytp-sfn-value, [class*="sfn-value"], [class*="sfn"][class*="value"]

# Fallback panel-container selectors (Strategy 3 in readStatsForNerds).
# Used when the label/value class search (Strategy 1) and XPath search
# (Strategy 2) both return empty results.  Separated by " | ".
yt.selector.sfn_panel_fallbacks=.ytp-sfn-stats | .html5-video-info-panel | [class*="sfn-stats"] | [class*="sfn"] | [class*="video-info-panel"]

# ── Stats for Nerds row label names (XPath fallback) ─────────────────────
# Known human-readable label names shown in the SFN panel rows.  Strategy 2 in
# readStatsForNerds uses XPath text-node matching against these names to extract
# the corresponding value cell — completely independent of CSS class names.
# Separated by commas.  Add new labels here if YouTube adds new SFN rows.
yt.sfn.known_labels=Connection Speed,Buffer Health,Network Activity,Current / Optimal Res,Codecs,Frames,Viewport / Frames

# ── Context menu ───────────────────────────────────────────────────────────
# Selects items inside the right-click context menu.  Used when the JS toggle
# approach fails to open the Stats for Nerds panel.
yt.selector.context_menu_item=.ytp-contextmenu .ytp-menuitem-label,.ytp-contextmenu .ytp-menuitem
