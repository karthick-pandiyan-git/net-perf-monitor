# ─────────────────────────────────────────────────────────────────────────────
# Statistical Analysis Parameters
# ─────────────────────────────────────────────────────────────────────────────
#
# Controls the spike-detection formula (SpikeAnalyzer) and the sample-size
# reliability gates (StatisticsEngine) used to classify DNS and website latency
# patterns as INFO / WARN / FAIL.  No recompile required.
# ─────────────────────────────────────────────────────────────────────────────

# ── StatisticsEngine — sample size gates ─────────────────────────────────
# Minimum number of samples for statistics to be considered "reliable"
# (high-confidence).  Below this count the outlier sigma gate is tightened.
stats.engine.min_reliable_samples=10

# Minimum number of samples to compute any statistics at all.
# Fewer than this produces a null Stats result — absolute thresholds only.
stats.engine.min_usable_samples=3

# Sigma multiplier for outlier detection when the sample is reliable (n >= min_reliable).
stats.engine.sigma.outlier.reliable=2.0

# Sigma multiplier for outlier detection when the sample is limited (n < min_reliable).
# Stricter gate reduces false positives on small samples.
stats.engine.sigma.outlier.limited=3.0

# ── SpikeAnalyzer — spike identification ──────────────────────────────────
# Sigma multiplier (k) used to define a spike threshold for both DNS and website
# probes.  A measurement is a spike when it exceeds (mean + k * stddev) of its
# per-group baseline.  5σ means only extreme outliers count as spikes.
spike.sigma_gate=5.0

# ── SpikeAnalyzer — hard failure thresholds ───────────────────────────────
# A spike (value > μ+5σ) only contributes to the cluster/periodic FAIL logic
# when it ALSO exceeds the respective hard threshold below.  Values above μ+5σ
# but below the hard threshold are flagged/annotated but do NOT cause FAIL.
#
# DNS: only response times above this threshold (ms) count towards failure.
# Anything above μ+5σ but below this is annotated as a spike (INFO) only.
spike.dns.hard_threshold.ms=500

# Website: only page-load times above the configured per-site page-load threshold
# count towards failure.  Set to 0 to use the per-site threshold from
# website-thresholds.properties (default behaviour).  Set a positive value here
# to use an explicit hard floor across all sites.
spike.website.use_pageload_threshold=true

# ── SpikeAnalyzer — cluster-burst detection ──────────────────────────────
# Width (ms) of the sliding window used to count spikes in close proximity.
spike.cluster_window.ms=60000

# Minimum spikes in the cluster window to declare a hard-failure cluster burst (website probe).
spike.cluster_threshold.website=5

# DNS-specific cluster threshold — DNS queries have more natural variance so a higher
# bar is appropriate before declaring a cluster burst.
# FAIL if ≥ 7 spikes in any 60 s window.
spike.cluster_threshold.dns=7

# ── SpikeAnalyzer — periodic-pattern detection ───────────────────────────
# Maximum inter-spike coefficient of variation (CV) to classify a pattern as
# periodic (regular, repeating).  CV < 0.40 means the gaps between spikes are
# relatively uniform — a sign of a recurring connectivity problem.
spike.periodic.cv_max=0.40

# Minimum spike rate (%) required for the periodicity gate to apply.
# Prevents flagging a single isolated spike pair as "periodic."
spike.periodic.rate_min_pct=1.0

# ── SpikeAnalyzer — elevated spike rate ──────────────────────────────────
# Spike rate (%) above which the result is elevated to WARN even when no
# cluster or periodic pattern is detected.
spike.warn_rate_pct=5.0

# ── Website — minimum cycle coverage ─────────────────────────────────────
# Minimum fraction (0.0–1.0) of expected refresh cycles that must actually
# complete for the website probe result to be trusted.  Expected cycles =
# durationSeconds / (cycleIntervalMs / 1000).  When actual cycles fall below
# this ratio the probe is marked FAIL with an "insufficient data" reason,
# because a single cycle cannot reliably represent steady-state performance.
website.min_cycles_ratio=0.25
