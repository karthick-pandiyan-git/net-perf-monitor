# ─────────────────────────────────────────────────────────────────────────────
# Probe Operational Timing Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Controls how the three monitoring probes (YouTube, Website, DNS) operate:
# sweep intervals, page-load timeouts, ad-handling wait budgets, and DNS
# resolver settings.  No recompile required — changes take effect on the
# next run.
# ─────────────────────────────────────────────────────────────────────────────

# ── YouTube probe — sweep loop ─────────────────────────────────────────────
# How often (seconds) each YouTube tab is sampled during the monitoring window.
# Raising this reduces CPU pressure but coarsens the bandwidth / buffer readings.
youtube.probe.sweep_interval.secs=5

# Page-load timeout applied to Chrome when opening YouTube tabs.
# Heavy 8K videos can take 30-45 s to reach readyState='complete' on first open.
youtube.probe.page_load_timeout.secs=45

# Max seconds to wait for a Selenium element (e.g. <video> tag) to be present.
youtube.probe.element_wait.secs=15

# How long (ms) to wait for the Stats-for-Nerds panel to populate its values
# after it has been opened.  The panel renders asynchronously; too short a wait
# produces empty rows on the first read.
youtube.probe.sfn_panel_settle.ms=1200

# ── YouTube probe — ad handling ────────────────────────────────────────────
# Maximum number of consecutive pre-roll / mid-roll ad rounds to process.
# After this limit the ad is abandoned and monitoring continues.
youtube.probe.ad.max_rounds=5

# Maximum ms to wait for a single ad to finish (skip button click or natural end).
# 45 s covers the longest non-skippable bumper ads YouTube currently serves.
youtube.probe.ad.max_wait.ms=45000

# Poll interval (ms) inside the unified skip-or-wait ad loop.
youtube.probe.ad.poll.ms=500

# Pause (ms) between consecutive ads.  Lets YouTube load the next queued ad
# before the code re-checks for the overlay, bridging the ~300–1500 ms inter-ad gap.
youtube.probe.ad.transition_wait.ms=2000

# ── Website probe — navigation cycles ─────────────────────────────────────
# How often (ms) each website tab is refreshed during the monitoring window.
website.probe.cycle_interval.ms=5000

# Page-load timeout for the initial cold tab open (uncached DNS, new TLS).
# Heavy enterprise sites (Amazon, AmEx) regularly need 8-15 s on first load.
website.probe.page_load_timeout_cold.secs=45

# Page-load timeout for warm measurement cycles (connections already established).
website.probe.page_load_timeout_warm.secs=30

# Max seconds to wait for a Selenium element in website operations.
website.probe.element_wait.secs=15

# ── DNS probe — resolver settings ─────────────────────────────────────────
# Target DNS resolver.  Google Public DNS (8.8.8.8) is queried directly over UDP,
# bypassing the OS cache so every query is a true network round-trip.
dns.probe.resolver_ip=8.8.8.8

# Per-query timeout in seconds.  If 8.8.8.8 does not respond within this time
# the internet path to the resolver is considered down for that query.
dns.probe.resolver_timeout.secs=5

# Pause (ms) between DNS query rounds.  Aligned with the YouTube/website sweep
# interval (5 s) so all three probes are compared on the same time axis.
dns.probe.pause_between_rounds.ms=5000
