# ─────────────────────────────────────────────────────────────────────────────
# YouTube + Website Performance Tester — Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Edit this file to customise which URLs are tested and the monitoring duration.
# No recompile is required — changes take effect on the next run.
#
# Duration can also be supplied as a command-line argument:
#   java -jar youtube-perf-test.jar --duration 120
# The CLI argument always wins over the value below.
#
# ─────────────────────────────────────────────────────────────────────────────

# Monitoring duration in seconds (30 – 900).
# 30 s is the minimum; 900 s (15 minutes) is the maximum.
# This also acts as the default when no --duration argument is passed.
test.duration.seconds=30

# ── YouTube URLs ──────────────────────────────────────────────────────────────
# One URL per numbered key (youtube.url.1, youtube.url.2, …).
# Add or remove entries; the tester opens one Chrome tab per entry.
# With --mode youtube_N (e.g. --mode youtube_10,website,DNS) the first N URLs
# are used.  The default when no count is specified (e.g. --mode all) is 2.
youtube.url.1=https://www.youtube.com/watch?v=ewX-BNUwi3c
youtube.url.2=https://www.youtube.com/watch?v=A5Y9besLaPw
youtube.url.3=https://www.youtube.com/watch?v=xp7lCcgS9Zo
youtube.url.4=https://www.youtube.com/watch?v=TMZ0dFvtjEM
youtube.url.5=https://www.youtube.com/watch?v=TKBXIIfkrlA
youtube.url.6=https://www.youtube.com/watch?v=x69etlhievQ
youtube.url.7=https://www.youtube.com/watch?v=eK5btDm24u0
youtube.url.8=https://www.youtube.com/watch?v=LAWlGNRoTBA
youtube.url.9=https://www.youtube.com/watch?v=JLdL3UTTiIE
youtube.url.10=https://www.youtube.com/watch?v=nIzwBNrq2tY

# ── Website URLs ─────────────────────────────────────────────────────────────
# Refreshed on every sweep cycle alongside the YouTube monitoring window.
website.url.1=https://www.facebook.com
website.url.2=https://www.pinterest.com
website.url.3=https://www.americanexpress.com
website.url.4=https://www.amazon.com

# ── DNS Domains ───────────────────────────────────────────────────────────────
# Queried directly over UDP to 8.8.8.8 throughout the monitoring window.
# Intentionally distinct from the browser tabs to provide independent signal.
dns.domain.1=google.com
dns.domain.2=cloudflare.com
# Replaced github.com — it has no AAAA records so AAAA queries always return NOERROR/empty.
# wikipedia.org has confirmed IPv6 support and is also used as a website probe target.
dns.domain.3=wikipedia.org
dns.domain.4=netflix.com
dns.domain.5=apple.com

# ── Website Thresholds ────────────────────────────────────────────────────────
# Default page-load and TTFB thresholds applied to all websites unless a
# per-site override is configured below.
# Cold = cycle 1 (uncached DNS, new TCP+TLS handshake).
# Warm = cycles 2+ (connections reused, resources may be cached).
website.threshold.default.pageload.warm.ms=5000
website.threshold.default.pageload.cold.ms=8000
website.threshold.default.ttfb.warm.ms=1200
website.threshold.default.ttfb.cold.ms=2000

# Per-site threshold overrides — key is the bare domain (e.g. americanexpress.com).
# Heavy or slow-loading sites may warrant higher thresholds to distinguish a
# genuine connectivity outage from expected content-delivery overhead.
# Any of the four values can be omitted; missing values fall back to the defaults above.
website.threshold.americanexpress.com.pageload.warm.ms=8000
website.threshold.americanexpress.com.pageload.cold.ms=14000
website.threshold.americanexpress.com.ttfb.warm.ms=3500

website.threshold.amazon.com.pageload.cold.ms=12000
website.threshold.amazon.com.ttfb.cold.ms=10000
website.threshold.amazon.com.pageload.warm.ms=7000
website.threshold.amazon.com.ttfb.warm.ms=2500

website.threshold.pinterest.com.ttfb.warm.ms=2500
