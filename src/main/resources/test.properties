# ─────────────────────────────────────────────────────────────────────────────
# YouTube + Website Performance Tester — Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Edit this file to customise which URLs are tested and the monitoring duration.
# No recompile is required — changes take effect on the next run.
#
# Duration can also be supplied as a command-line argument:
#   java -jar youtube-perf-test.jar --duration 120
# The CLI argument always wins over the value below.
#
# ─────────────────────────────────────────────────────────────────────────────

# Monitoring duration in seconds (30 – 900).
# 30 s is the minimum; 900 s (15 minutes) is the maximum.
# This also acts as the default when no --duration argument is passed.
test.duration.seconds=30

# ── YouTube URLs ──────────────────────────────────────────────────────────────
# One URL per numbered key (youtube.url.1, youtube.url.2, …).
# Add or remove entries; the tester opens one Chrome tab per entry.
youtube.url.1=https://www.youtube.com/watch?v=ewX-BNUwi3c
youtube.url.2=https://www.youtube.com/watch?v=A5Y9besLaPw

# ── Website URLs ─────────────────────────────────────────────────────────────
# Refreshed on every sweep cycle alongside the YouTube monitoring window.
website.url.1=https://www.craigslist.org
website.url.2=https://www.wikipedia.org
website.url.3=https://www.facebook.com
website.url.4=https://www.amazon.com

# ── DNS Domains ───────────────────────────────────────────────────────────────
# Queried directly over UDP to 8.8.8.8 throughout the monitoring window.
# Intentionally distinct from the browser tabs to provide independent signal.
dns.domain.1=google.com
dns.domain.2=cloudflare.com
dns.domain.3=github.com
dns.domain.4=netflix.com
dns.domain.5=apple.com
